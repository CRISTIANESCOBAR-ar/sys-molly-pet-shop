<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#62ef4f" />
    <meta name="description" content="Sistema de gestión - Molly Petshop" />
    <title>Molly Petshop</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f3f4f6;
      }

      #boot-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 20% 10%, rgba(164, 255, 124, 0.45), transparent 40%),
          radial-gradient(circle at 80% 90%, rgba(80, 220, 76, 0.38), transparent 45%),
          #62ef4f;
        opacity: 1;
        transition: opacity 220ms ease;
      }

      #boot-splash.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      #boot-logo-wrap {
        background-color: #62ef4f;
        border-radius: 22px;
        overflow: hidden;
        width: min(62vw, 260px);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
        transform-origin: center;
        animation: boot-heartbeat 1.7s ease-in-out infinite;
      }

      #boot-logo-wrap img {
        width: 100%;
        height: auto;
        display: block;
      }

      @keyframes boot-heartbeat {
        0% { transform: scale(1); }
        16% { transform: scale(1.06); }
        28% { transform: scale(0.99); }
        42% { transform: scale(1.08); }
        58% { transform: scale(1); }
        100% { transform: scale(1); }
      }

      @media (prefers-reduced-motion: reduce) {
        #boot-logo-wrap {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-splash" aria-hidden="true">
      <div id="boot-logo-wrap">
        <img src="/Molly.png" alt="Molly Petshop" />
      </div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
